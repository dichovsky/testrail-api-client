name: Publish

# Triggered when a GitHub Release is published (draft → published, or new release).
# The publish job runs the full pre-publish gate (typecheck, lint, tests, build)
# explicitly rather than relying on the prepublishOnly lifecycle hook, since
# .npmrc ignore-scripts=true may suppress lifecycle hooks during publish.
on:
    release:
        types: [published]

# Minimal permissions: read source + write OIDC token for npm Trusted Publishing.
# No NPM_TOKEN secret is required — npm validates the OIDC token issued by
# GitHub Actions against the repository's Trusted Publisher configuration on
# npmjs.com. Provenance attestations are written to the GitHub release via the
# attestations permission.
permissions:
    contents: read
    id-token: write
    attestations: write

concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-publish
        timeout-minutes: 15

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: '.nvmrc'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Type-check
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Test (with coverage)
              run: npm run test:coverage

            - name: Build
              run: npm run build

            - name: Generate skill documentation
              run: npx tsx scripts/generate-skill.ts

            - name: Verify skill drift
              run: npm run skill:check

            - name: Strip source maps from dist/
              run: npm run clean:maps

            # Preflight: if this exact version is already on npm, skip the publish
            # step so a re-published GitHub Release exits green instead of failing
            # the duplicate-version PUT with a misleading red ❌. `npm view` prints
            # the version when it exists and nothing when it does not, so a
            # non-empty result is the signal; a transient lookup failure only
            # degrades to the prior duplicate-error behavior, never a false skip.
            - name: Skip if this version is already published
              id: preflight
              run: |
                  PKG="$(node -p "require('./package.json').name")"
                  VER="$(node -p "require('./package.json').version")"
                  if [ -n "$(npm view "$PKG@$VER" version 2>/dev/null)" ]; then
                      echo "already-published=true" >> "$GITHUB_OUTPUT"
                      echo "::notice::$PKG@$VER is already on npm — skipping publish."
                  fi

            - name: Publish to npm with provenance
              if: steps.preflight.outputs.already-published != 'true'
              run: npm publish --provenance
