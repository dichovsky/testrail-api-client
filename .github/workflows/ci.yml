name: CI

on:
    push:
    pull_request:
        branches: [main, dev]

jobs:
    gen-drift:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Run codemap drift check
              run: npm run codemap:check

            # Call the generator directly instead of `npm run skill`, which
            # would re-run `npm run build` (already executed above). The
            # standalone build step is the single source of dist/ for all
            # three drift checks; chaining via `npm run skill` duplicated
            # the TypeScript compile and undermined fail-fast.
            - name: Generate skill documentation
              run: npx tsx scripts/generate-skill.ts

            - name: Run skill drift check
              run: npm run skill:check

            - name: Run API mapping drift check
              run: npm run mapping:check

    lint-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Run TypeScript type check
              run: npm run typecheck

            - name: Run linting
              run: npm run lint

            - name: Run tests
              run: npm run test:coverage

    fuzz:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run CLI fuzz tests
              run: RUN_FUZZ=1 npx vitest run tests/cli-fuzz.test.ts

    security-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # Production audit: the shipped artifact has one runtime dep (Zod).
            # --omit=dev keeps this gate focused on what consumers actually install.
            - name: Run security audit (production deps)
              run: npm audit --omit=dev --audit-level=moderate

            # Full-tree audit incl. dev deps, with documented allowlist exceptions
            # (see audit-ci.jsonc — dev-only, non-exploitable advisories only).
            - name: Run dependency vulnerability check
              run: npx audit-ci --moderate --config audit-ci.jsonc
