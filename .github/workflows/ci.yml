name: CI

on:
    push:
    pull_request:
        branches: [main, dev]

jobs:
    gen-drift:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Run codemap drift check
              run: npm run codemap:check

            # Call the generator directly instead of `npm run skill`, which
            # would re-run `npm run build` (already executed above). The
            # standalone build step is the single source of dist/ for all
            # three drift checks; chaining via `npm run skill` duplicated
            # the TypeScript compile and undermined fail-fast.
            - name: Generate skill documentation
              run: node scripts/generate-skill.js

            - name: Run skill drift check
              run: npm run skill:check

            - name: Run API mapping drift check
              run: npm run mapping:check

    lint-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Run TypeScript type check
              run: npm run typecheck

            - name: Run linting
              run: npm run lint

            - name: Run tests
              run: npm run test:coverage

    security-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run security audit
              run: npm audit --audit-level=moderate

            - name: Run dependency vulnerability check
              run: npx audit-ci --moderate
